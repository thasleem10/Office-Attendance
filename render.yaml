services:
  - type: web
    name: face-attendance-app
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:10000 --timeout 120 --workers 2 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
